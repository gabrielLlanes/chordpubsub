apiVersion: v1
kind: Service
metadata:
  name: node4
spec:
  type: ClusterIP
  selector:
    app: node-4-pod
  ports:
    - name: port-8080
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: rmi-port
      port: 1099
      targetPort: 1099
      protocol: TCP
    - name: hazelcast
      port: 5701
