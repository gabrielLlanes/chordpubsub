apiVersion: v1
kind: Pod
metadata:
  creationTimestamp: null
  labels:
    run: node2
    app: node-2-pod
  name: node-2-pod
spec:
  volumes:
    - name: my-disk
      emptyDir: {}
  containers:
    - image: docker.io/asmiwdtc/chordpubsubnode
      imagePullPolicy: Always
      name: node-2-pod-container
      command: ["java", "-jar", "/app/app.jar"]
      env:
        - name: CHORD_DEGREE
          value: "12"
        - name: CHORD_HOSTNAME
          value: "node2"
        - name: CHORD_FIRST_NODE
          value: "false"
        - name: RMI_PORT
          value: "1099"
        - name: CHORD_JOIN_NODE_HOSTNAME
          value: "node1"
        - name: CHORD_JOIN_NODE_PORT
          value: "1099"
      volumeMounts:
        - name: my-disk
          mountPath: /my-data
      resources: {}
  dnsPolicy: ClusterFirst
  restartPolicy: Always
status: {}
